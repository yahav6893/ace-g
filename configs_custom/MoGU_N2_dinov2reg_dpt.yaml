sst:
  output_dir: ~/dace/outputs
  num_iterations: 10000
  train_head: true

  # --- Late fusion head: 2 expert MLPHeads + gating weights ---
  head:
    obj_type: ace_g.scr_heads.UncExpertFusionHead
    dim_in: 2048
    num_experts: 2

    expert_head_paths:
      - /home/eng/vinokuy2/dace/outputs/heads/DINOv2_vitl_reg-aceg_cambridge-shopfacade_head.pt
      - /home/eng/vinokuy2/dace/outputs/heads/dptv2_vitl-aceg_cambridge-shopfacade_head.pt
    freeze_loaded_experts: true
    force_shared_mean: true   # recommended unless you verified both heads have identical mean

    expert_head:
      obj_type: ace_g.scr_heads.MLPHead
      dim_in: 1024
      num_blocks: 1
      use_homogeneous: true
      homogeneous_min_scale: 0.01
      homogeneous_max_scale: 4.0
      use_uncertainty: false

    mogu_loss_weight: 1.0
    
    unc_head:
      dim_in: 1024
      out_dim: 3
      arc_type: mlp
      hidden_ratio: 1.0
      head_dropout: 0.0
      var_eps: 1.0e-6

  eps: 1.0e-8
  return_fused_uncertainty: false

  # --- Encoder: ONE list (vanilla DINOv2, DPTv2) ---
  encoder:
    obj_type: ace_g.encoders.ListMultiEncoder
    kwargs:
      encoders:
        - obj_type: ace_g.encoders.DINOv2Encoder
          kwargs:
            model_name: dinov2_vitl14_reg
          path: null

        - obj_type: ace_g.encoders.DPTv2Encoder
          kwargs:
            model_name: vitl
            checkpoint: /home/eng/vinokuy2/dace/cache/depth_anything/depth_anything_v2_vitl.pth
          path: null
    path: null

  # --- ACE-G 5min defaults ---
  max_buffer_size: 2_000_000
  schedule_config:
    learning_rate_div_factor: 25
    learning_rate_final_div_factor: 10000
  use_feature_aug: true
  feature_aug_drop: 0.1
  feature_aug_std: 0.0
  use_half: true
