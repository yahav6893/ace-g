sst:
  output_dir: /content/drive/MyDrive/ace_g_outputs
  iterations: 25000
  train_head: true
  head:
    obj_type: ace_g.scr_heads.FusionHead
    dim_in: null
    num_encoders: 3
    main_index: 0
    q_mlp_ratio: 4.0
    proj_drop: 0.0
    attn_drop: 0.0
    mlp_num_blocks: 1
    use_homogeneous: true
    homogeneous_min_scale: 0.01
    homogeneous_max_scale: 4.0
    use_uncertainty: false
  encoder:
    obj_type: ace_g.encoders.MultiDinoEncoder
    kwargs:
      main:
        obj_type: ace_g.encoders.DINOv2Encoder
        kwargs:
          model_name: dinov2_vitl14
        path: null
      fusion:
        - obj_type: ace_g.encoders.DPTv2Encoder
          kwargs:
            model_name: vitl
            checkpoint: /content/drive/MyDrive/ace_cache/depth_anything/depth_anything_v2_vitl.pth
          path: null
        - obj_type: ace_g.encoders.SELAEncoder
          kwargs:
            checkpoint: /content/drive/MyDrive/ace_cache/selavpr_weights/SelaVPR_msls.pth
          path: null
    path: null
  max_buffer_size: 6000000
  schedule_config:
    learning_rate_div_factor: 25
    learning_rate_final_div_factor: 10000
  use_feature_aug: true
  feature_aug_drop: 0.1
  feature_aug_std: 0.0
  use_half: true
