sst:
  output_dir: /content/drive/MyDrive/ace_g_outputs
  iterations: 25000
  train_head: True
  head:
    obj_type: ace_g.scr_heads.MLPHead
  encoder:
    obj_type: ace_g.encoders.DPTv2Encoder
    kwargs:
      variant: vitl
      checkpoint_path: /content/drive/MyDrive/ace_cache/depth_anything/depth_anything_v2_vitl.pth
      tap: path_0
      out_subsample_factor: 14

      # DINO-ACE comparable default: do NOT change preprocessing pipeline
      input_mode: passthrough

      # Stability (recommended for DPT): run forward in fp32
      force_fp32: true
      debug_checks: false
    path: null
  max_buffer_size: 4_000_000
  schedule_config:
    learning_rate_div_factor: 25
    learning_rate_final_div_factor: 10000
  use_feature_aug: True
  feature_aug_drop: 0.1
  feature_aug_std: 0.0
